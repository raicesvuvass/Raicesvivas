<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raíces Vivas</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ---------------- FONDO CARRUSEL ---------------- */
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    color:white;
    overflow-x:hidden;
    background-size:cover;
    background-position:center;
    animation:fondoCarrusel 18s infinite;
}

@keyframes fondoCarrusel{
    0% {background-image: linear-gradient(rgba(0,40,0,0.75),rgba(0,40,0,0.75)), url('4d9516dde5c4f0197145373c2721f0a2.jpg');}
    33% {background-image: linear-gradient(rgba(0,40,0,0.75),rgba(0,40,0,0.75)), url('254d17674be897b556fb15400ecf05f3.jpg');}
    66% {background-image: linear-gradient(rgba(0,40,0,0.75),rgba(0,40,0,0.75)), url('1cff0919e32126bf4b5e77d75be5dbb9.jpg');}
    100% {background-image: linear-gradient(rgba(0,40,0,0.75),rgba(0,40,0,0.75)), url('4d9516dde5c4f0197145373c2721f0a2.jpg');}
}

/* ---------------- TITULOS ---------------- */
h1,h2{
    text-align:center;
    font-family:'Playfair Display', serif;
    color:#e8d29c;
    letter-spacing:2px;
}

p{
    text-align:center;
    max-width:800px;
    margin:auto;
}

/* ---------------- LOGO ANIMADO ---------------- */
.logo-container{
    text-align:center;
    margin-top:20px;
}

.logo{
    width:200px;
    height:200px;
    border-radius:50%;
    border:5px solid #e8d29c;
    object-fit:cover;
    animation:flotar 3s ease-in-out infinite;
}

@keyframes flotar{
    0%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
    100%{transform:translateY(0);}
}

/* ---------------- PRODUCTOS ---------------- */
.productos{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:30px;
    flex-wrap:nowrap;
}

.producto-card{
    background:rgba(0,0,0,0.65);
    border:2px solid #e8d29c;
    border-radius:15px;
    width:45%;
    padding:20px;
    text-align:center;
}

.producto-card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
}

.producto-card h3{
    font-family:'Playfair Display', serif;
    color:#e8d29c;
}

/* PRECIO */
.precio{
    font-size:22px;
    font-weight:bold;
    color:#25D366;
    margin:10px 0;
}

/* BOTÓN WHATSAPP */
.boton{
    display:inline-block;
    margin-top:10px;
    padding:10px 18px;
    background:#25D366;
    color:white;
    text-decoration:none;
    border-radius:25px;
    font-weight:500;
    transition:0.3s;
}

.boton:hover{
    background:#1ebe5d;
}

/* RESPONSIVE */
@media(max-width:600px){
    .producto-card{
        width:48%;
    }
}

</style>
</head>

<body>

<div class="logo-container">
    <img src="IMG-20260226-WA0002.jpg" class="logo">
</div>

<h1>Raíces Vivas</h1>
<p>Cuidando tu cabello natural con ingredientes 100% naturales</p>

<h2>Productos Naturales</h2>

<div class="productos">

    <div class="producto-card">
        <img src="imagen1.jpg">
        <h3>Tónico Capilar de Romero</h3>
        <p>Estimula el crecimiento y fortalece las raíces.</p>

        <div class="precio">$$$$</div>

        <a class="boton" 
        href="https://wa.me/573234629922?text=Hola%20quiero%20comprar%20el%20Tónico%20Capilar%20de%20Romero" 
        target="_blank">Comprar</a>
    </div>

    <div class="producto-card">
        <img src="imagen2.jpg">
        <h3>Aceite de Aguacate Capilar</h3>
        <p>Hidratación profunda y brillo natural.</p>

        <div class="precio">$$$$</div>

        <a class="boton" 
        href="https://wa.me/573234629922?text=Hola%20quiero%20comprar%20el%20Aceite%20de%20Aguacate%20Capilar" 
        target="_blank">Comprar</a>
    </div>

</div>

</body>
</html>
